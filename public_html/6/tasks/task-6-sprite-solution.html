<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задание 2: CSS спрайты (решение)</title>
    <link rel="stylesheet" href="../../css/6_2_2.css">
</head>
<body>
    <div class="example">
        <h2>Задание 2: CSS спрайты (РЕШЕНИЕ)</h2>
        
        <div class="sprite-task">
            <div class="sprite-icon sprite-fb"></div>
            <div class="sprite-icon sprite-tw"></div>
            <div class="sprite-icon sprite-yt"></div>
            <div class="sprite-icon sprite-ig"></div>
        </div>
        
        <p><strong>Что использовано:</strong></p>
        <ul>
            <li>background-image: url('../6/examples/resource/4.png') - одна картинка-спрайт</li>
            <li>background-position для показа нужной иконки</li>
            <li>width: 48px; height: 48px - размер каждой иконки</li>
            <li>background-repeat: no-repeat - чтобы не повторялась</li>
        </ul>
    </div>
</body>
</html>
