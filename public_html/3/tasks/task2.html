<!DOCTYPE html>
<html>
    <head>
        <meta charset='utf-8'>
        <title>Формы и интерактивные элементы</title>
        <link rel='stylesheet' href='../../css/3.css'>
    </head>
    <body>

        <h2>Задание 2</h2>

        <p>Создайте форму выбора города.</p>

        <p>Форма должна содержать:</p>

        <ul>
            <li>выпадающий список с тремя городами</li>
            <li>кнопку отправки формы</li>
        </ul>

        <hr>

        <h3>Заготовка</h3>

        <form>
            <select>
                <option>Ярославль</option>
                <option>Москва</option>
                <option>Санкт-Петербург</option>
            </select>
            <button>Отправить</button>
        </form>
    </body>
</html>
