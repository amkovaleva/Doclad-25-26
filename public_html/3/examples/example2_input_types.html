<!--(типы input)-->
<!DOCTYPE html>
<html>
    <head>
        <meta charset='utf-8'>
        <title>Формы и интерактивные элементы</title>
        <link rel='stylesheet' href='../../css/3.css'>
    </head>
    <body>
        <h2>Типы input</h2>

        Текст:
        <input type="text">

        <br><br>

        Email:
        <input type="email">

        <br><br>

        Пароль:
        <input type="password">

        <br><br>

        Пол:

        <input type="radio" name="gender"> Мужской
        <input type="radio" name="gender"> Женский

        <br><br>

        Интересы:

        <input type="checkbox"> Спорт
        <input type="checkbox"> Музыка
        <input type="checkbox"> Путешествия
    </body>
</html>
