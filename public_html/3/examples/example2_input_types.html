<!--(типы input)-->
<!DOCTYPE html>
<html>
    <head>
        <meta charset='utf-8'>
        <title>Формы и интерактивные элементы</title>
        <link rel='stylesheet' href='../../css/3.css'>
    </head>
    <body>
        <h2>Типы input</h2>

        Текст:
        <input type="text">

        <br><br>

        Email:
        <input type="email">

        <br><br>

        Пароль:
        <input type="password">

        <br><br>

        Дата:
        <input type="date">

        <br><br>

        Время:
        <input type="time">

        <br><br>

        Цвет:
        <input type="color">

        <br><br>

        Диапазон:
        <input type="range">

        <br><br>

        Число:
        <input type="number">

        <br><br>

        Пароль
        <input type="password">

        <br><br>

        Телефон:
        <input type="tel">

        <br><br>

        Файл:
        <input type="file">

        <br><br>

        URL:
        <input type="url">

        <br><br>

        Поиск:
        <input type="search">

        <br><br>

        <p>Пол:</p>

        <label for="male">
            <input id="male" type="radio" name="gender" checked> Мужской
        </label>

        <label for="female">
            <input id="female" type="radio" name="gender"> Женский
        </label>

        <br><br>

        <p>Тип аккаунта:</p>

        <label>
            <input type="radio" name="account"> Студент
        </label>

        <label>
            <input type="radio" name="account"> Преподаватель
        </label>

        <br><br>

        Интересы:

        <label for="sport">
            <input id="sport" type="checkbox"> Спорт
        </label>

        <label for="music">
            <input id="music" type="checkbox"> Музыка
        </label>
        
        <label for="travel">
            <input id="travel" type="checkbox"> Путешествия
        </label>
    </body>
</html>
