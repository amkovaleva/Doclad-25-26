<!--(пример progress + meter)-->
<!DOCTYPE html>
<html>
    <head>
        <meta charset='utf-8'>
        <title>Формы и интерактивные элементы</title>
        <link rel='stylesheet' href='../../css/3.css'>
    </head>
    <body>
        <h3>Прогресс загрузки</h3>

        <progress value="60" max="100"></progress>
        
        <h3>Уровень заряда</h3>

        <meter min="0" max="100" value="70" low="30" high="80" optimum="100"></meter>
    </body>
</html>
