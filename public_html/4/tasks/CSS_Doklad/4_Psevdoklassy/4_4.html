<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Псевдоклассы и псевдоэлементы</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Пример псевдоэлементов и классов:</h2>

    <!-- 1. Псевдокласс :hover -->
    <a href="#">Наведи на ссылку</a><br><br>

    <!-- 2. Псевдокласс :focus -->
    <input type="text" placeholder="Кликни в поле"><br><br>

    <!-- 3. Псевдоэлементы ::before и ::first-line -->
    <p class="text">
        Это первый абзац текста. Первая строка будет выделена жирным. 
        А перед всем текстом появится стрелочка.
    </p>
</body>
</html>
