<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Селекторы атрибутов</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h2>Пример селекторов атрибутов:</h2>
    
    <!-- Поля ввода -->
    <input type="text" placeholder="Текстовое поле">
    <input type="password" placeholder="Пароль"><br><br>
    
    <!-- Ссылки -->
    <a href="https://example.com">Безопасная ссылка (https)</a><br>
    <a href="http://example.com">Обычная ссылка (http)</a><br><br>
    
    <!-- Картинки -->
    <img src="photo.png" alt="PNG фото" width="100"><br>
    <img src="photo.jpg" alt="JPG фото" width="100">
</body>
</html>
