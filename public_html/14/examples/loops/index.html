<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Циклы</title>
  <link rel="stylesheet" href="styles/css.css">
</head>
<body>
  <h2>@for — отступы</h2>
  <div class="br-1 tag">gap-1 (10px)</div>
  <div class="br-2 tag">gap-2 (20px)</div>
  <div class="br-3 tag">gap-3 (30px)</div>
  <div class="br-4 tag">gap-4 (40px)</div>

  <h2>@each — теги</h2>
  <span class="tag-ok">ok</span>
  <span class="tag-err">err</span>
  <span class="tag-warn">warn</span>
  <span class="tag-info">info</span>
</body>
</html>
