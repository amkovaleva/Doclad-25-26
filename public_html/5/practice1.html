<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Задание 1: Карточка товара</title>
    <style>
        /* Ваш код пишите здесь */
        .product-card {
            width: 250px;
            border: 1px solid #ddd;
            padding: 15px;
        }
        .product-image {
            width: 100%;
            height: auto;
        }
        /* Опишите стили для названия, цены и кнопки */
    </style>
</head>
<body>
    <div class="product-card">
        <img src="https://via.placeholder.com/250x150" alt="Product" class="product-image">
        <h3 class="product-title">Стильная футболка "Urban"</h3>
        <p class="product-description">Хлопок 100%, доступные размеры S-XXL.</p>
        <div class="product-price">1 990 ₽</div>
        <button class="product-button">В корзину</button>
    </div>
</body>
</html>
