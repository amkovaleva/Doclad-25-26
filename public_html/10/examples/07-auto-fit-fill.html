<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Grid: auto-fit/fill</title>
    <link rel="stylesheet" href="../../css/10.css">
</head>
<body>
    <div class="example">
        <h2>Пример 7: auto-fit</h2>
        <div class="grid-fit">
            <div>1</div>
            <div>2</div>
            <div>3</div>
        </div>
        
        <h2>Пример 7: auto-fill</h2>
        <div class="grid-fill">
            <div>1</div>
            <div>2</div>
            <div>3</div>
        </div>
    </div>
</body>
</html>
