<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Grid: выравнивание</title>
    <link rel="stylesheet" href="../../css/10.css">
</head>
<body>
    <div class="example">
        <h2>Пример 8: place-items: center</h2>
        <div class="grid-align center">
            <div>1</div>
            <div>2</div>
            <div>3</div>
            <div>4</div>
            <div>5</div>
            <div>6</div>
        </div>
        
        <h2>Пример 8: place-items: start</h2>
        <div class="grid-align start">
            <div>1</div>
            <div>2</div>
            <div>3</div>
            <div>4</div>
            <div>5</div>
            <div>6</div>
        </div>
    </div>
</body>
</html>
